name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          pip install -r requirements.txt
      - name: Lint with pre-commit
        run: pre-commit run --all-files
        env:
          SKIP: run-tests,check-user-approval,update-changelog,eslint,prettier

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test with pytest
        run: |
          pytest -m "not neo4j" -v
        env:
          PYTHONPATH: .

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd src/frontend
          npm ci
      - name: Test with npm
        run: |
          cd src/frontend
          npm test

  check-user-approval:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check for user approval
        run: |
          if [ ! -f "INTERACTION_LOG.md" ]; then
            echo "Error: INTERACTION_LOG.md does not exist."
            exit 1
          fi

          if ! grep -iE "feature set approved|user approval|approved by user" INTERACTION_LOG.md; then
            echo "Error: No user approval found in INTERACTION_LOG.md."
            echo "Please document user approval in the interaction log."
            exit 1
          fi

          echo "User approval found in interaction log."
